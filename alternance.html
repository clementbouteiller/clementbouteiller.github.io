<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --dark:  #0F1F2E;
  --beige: #EDE8DF;
  --text:  #1A1410;
  --muted: #5C5248;
  --accent:#CC0000;
  --white: #FFFFFF;
  --border:rgba(255,255,255,0.10);
}
html { scroll-behavior: smooth; }
body { font-family: 'Open Sans', sans-serif; background: var(--beige); color: #999990; }

nav {
  background: var(--dark); padding: 0 6rem; height: 75px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
}
.nav-logo span { font-family: 'Raleway', sans-serif; font-size: 1rem; font-weight: 800; color: #fff; letter-spacing: .04em; }
.nav-logo span b { color: var(--accent); }
.nav-links { display: flex; gap: 2.2rem; list-style: none; }
.nav-links a {
  font-family: 'Raleway', sans-serif; font-size: .82rem; font-weight: 600; letter-spacing: .05em;
  color: rgba(255,255,255,0.75); text-decoration: none; transition: color .2s;
  position: relative; padding-bottom: 4px;
}
.nav-links a::after {
  content: ''; position: absolute; bottom: 0; left: 0;
  width: 0; height: 2px; background: var(--accent); transition: width .3s ease;
}
.nav-links a:hover { color: var(--white); }
.nav-links a:hover::after { width: 100%; }
.nav-links a.active { color: var(--white); font-weight: 700; }
.nav-links a.active::after { width: 100%; }

.page {
  min-height: calc(100vh - 75px - 140px);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 4rem 6rem; text-align: center; gap: 3rem;
}

.coming-soon {
  font-family: 'Raleway', sans-serif;
  font-size: 2.5rem; font-weight: 800;
  color: #999990;
}
.coming-soon span { color: #999990; }

.maif-logo { width: 420px; height: auto; opacity: .9; }

footer {
  background: var(--dark); padding: 2.4rem 6rem; text-align: center;
}
.footer-label {
  font-family: 'Raleway', sans-serif; font-size: .72rem; font-weight: 700;
  letter-spacing: .14em; text-transform: uppercase; color: #fff; margin-bottom: 1rem;
}
.footer-icons { display: flex; align-items: center; justify-content: center; gap: 1.6rem; margin-bottom: 1.4rem; }
.footer-icon {
  width: 38px; height: 38px; border: 1.5px solid rgba(255,255,255,0.25);
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  color: #fff; text-decoration: none; font-size: .9rem;
  transition: border-color .2s, color .2s;
}
.footer-icon:hover { border-color: var(--accent); color: var(--accent); }
.footer-icon.icon-mail { display: flex; align-items: center; justify-content: center; font-size: .9rem; } .footer-icon.icon-mail svg { width: 14px; height: 14px; }
@media (max-width: 860px) { .footer-icon { width: 58px; height: 58px; font-size: 1.3rem; display: flex; align-items: center; justify-content: center; } .footer-icon.icon-mail { font-size: 1.3rem; } .footer-icon svg { width: 26px; height: 26px; } .footer-icon.icon-mail svg { width: 26px; height: 26px; } .footer-icons { gap: 2.2rem; } }
.footer-logo-img { display: flex; justify-content: center; margin-bottom: .6rem; }
.footer-copy { font-size: .7rem; color: rgba(255,255,255,.3); }


/* ── BURGER MENU ── */
.burger { display:none; flex-direction:column; gap:5px; cursor:pointer; padding:4px; }
.burger span { display:block; width:22px; height:2px; background:#fff; border-radius:2px; transition:all .3s; }
.burger.open span:nth-child(1) { transform:translateY(7px) rotate(45deg); }
.burger.open span:nth-child(2) { opacity:0; }
.burger.open span:nth-child(3) { transform:translateY(-7px) rotate(-45deg); }
.nav-mobile { display:none !important; flex-direction:column; background:var(--dark); padding:1rem 1.5rem; gap:.5rem; }
.nav-mobile a { font-family:'Raleway',sans-serif; font-size:.9rem; font-weight:600; color:rgba(255,255,255,.8); text-decoration:none; padding:.5rem 0; border-bottom:1px solid rgba(255,255,255,.07); }
.nav-mobile a:last-child { border-bottom:none; }
.nav-mobile a.active { color:#fff; }
.nav-mobile.open { display:flex !important; }
.nav-mobile .lang-toggle-wrap { padding:.6rem 0 0; }
@media (max-width: 860px) {
  nav { padding:0 1.5rem; }
  .nav-links { display:none !important; }
  .lang-toggle-wrap { display:none !important; }
  .burger { display:flex; }
  .nav-mobile.open { display:flex; }
}

/* ── LANG TOGGLE ── */
.lang-toggle-wrap { display:flex; align-items:center; gap:4px; margin-left:1.5rem; }
.lang-btn { font-family:'Raleway',sans-serif; font-size:.75rem; font-weight:700; letter-spacing:.06em; color:rgba(255,255,255,.5); background:transparent; border:1.5px solid rgba(255,255,255,.2); border-radius:4px; padding:3px 8px; cursor:pointer; transition:all .2s; }
.lang-btn.active { color:#fff; border-color:#4CAF50; background:#4CAF50; }
.lang-btn:hover:not(.active) { color:#fff; border-color:rgba(255,255,255,.5); }
</style>

<script>
function handlePhone() {
  if (window.innerWidth <= 860) {
    window.location.href = "tel:+33768388726";
  } else {
    copyText("0768388726");
  }
}
function copyText(text) {
  var t = document.getElementById("toast");
  t.textContent = text;
  t.style.opacity = "0";
  t.style.transform = "translateY(20px)";
  t.classList.add("show");
  setTimeout(function(){ t.classList.remove("show"); }, 3000);
}
</script>
